apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: toto
spec:
  containers:
    - name: nginx
      image: nginx:stable
      ports:
        - name: http
          containerPort: 80
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 128Mi
      livenessProbe:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 5
        periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: toto
  labels:
    app: toto
spec:
  type: LoadBalancer
  selector:
    app: toto
  ports:
    - name: http
      port: 80
      targetPort: 80
